<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowthX｜學員陪跑系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ... 保留你原本的 CSS 變數與錄影器樣式 ... */
    :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --surface:#ffffff; }
    body { background-color: var(--bg); font-family: system-ui, -apple-system, sans-serif; }
    
    .app-container { max-width: 800px; margin: auto; padding: 20px; }
    .card-panel { background: var(--surface); border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 20px; }
    
    /* 貼文資訊流樣式 */
    .post-card { border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; padding: 20px; margin-bottom: 16px; }
    .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .badge-status { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-待回覆 { background: #fef08a; color: #854d0e; }
    .status-呼叫教練 { background: #fecaca; color: #991b1b; }
    .status-已解決 { background: #bbf7d0; color: #166534; }
    
    /* 影片畫廊 */
    .video-gallery { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-top: 15px; }
    .video-gallery a { padding: 8px 16px; background: #e2e8f0; border-radius: 8px; text-decoration: none; color: var(--primary); font-size: 13px; white-space: nowrap; }
    .video-gallery a:hover { background: #cbd5e1; }
    
    .ai-reply-box { background: #f0fdf4; border-left: 4px solid #22c55e; padding: 16px; border-radius: 0 8px 8px 0; margin-top: 15px; }
  </style>
</head>
<body>

<div class="app-container">
  <div id="view-login" class="card-panel text-center">
    <h3>GrowthX 陪跑系統</h3>
    <p class="text-muted">請輸入信箱獲取驗證碼登入</p>
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="您的信箱">
    <button class="btn btn-primary w-100 mb-2" onclick="sendCode()" id="btnSendCode">發送驗證碼</button>
    <div id="codeSection" style="display:none;">
      <input type="text" id="loginCode" class="form-control mb-3" placeholder="6位數驗證碼">
      <button class="btn btn-success w-100" onclick="verifyCode()">登入系統</button>
    </div>
  </div>

  <div id="view-main" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 id="userGreeting" class="fw-bold m-0"></h4>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">登出</button>
    </div>

    <div class="card-panel">
      <div class="d-flex justify-content-between align-items-center cursor-pointer" onclick="toggleRecordUI()">
        <h5 class="m-0"><i data-lucide="video"></i> 發起新提問 / 回覆</h5>
        <i data-lucide="chevron-down"></i>
      </div>
      <div id="recordUI" style="display:none; margin-top:20px;">
        <button class="btn btn-primary w-100" onclick="startPost()">開始錄製說明</button>
        <p id="recordStatus" class="mt-2 text-center text-muted"></p>
      </div>
    </div>

    <div class="d-flex gap-2 mb-3">
      <select id="filterStatus" class="form-select w-auto" onchange="loadFeed()">
        <option value="全部">全部狀態</option>
        <option value="待回覆">待回覆</option>
        <option value="呼叫教練">已呼叫教練</option>
        <option value="已解決">已解決</option>
      </select>
      <input type="text" id="searchInput" class="form-control" placeholder="搜尋關鍵字..." onkeyup="if(event.key==='Enter') loadFeed()">
    </div>

    <div id="feedContainer"></div>
    
    <div class="d-flex justify-content-between mt-3">
      <button class="btn btn-outline-secondary" onclick="changePage(-1)">上一頁</button>
      <span id="pageInfo" class="align-self-center"></span>
      <button class="btn btn-outline-secondary" onclick="changePage(1)">下一頁</button>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8Ieg90ujrYBfX1Psn5GNLgBr_W-pIja7b99B3Whiaa2BI4v0VsSmTLMSV81_nMNUi/exec";
  let currentUser = JSON.parse(localStorage.getItem('gx_user') || 'null');
  let currentPage = 1;
  let totalPages = 1;

  // 初始化檢查登入狀態
  if (currentUser) {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-main').style.display = 'block';
    document.getElementById('userGreeting').innerText = `你好，${currentUser.role}`;
    loadFeed();
  }

  // --- API 呼叫共用函數 ---
  async function api(payload) {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
    return await res.json();
  }

  // --- 登入邏輯 ---
  async function sendCode() {
    const email = document.getElementById('loginEmail').value;
    if(!email) return alert("請輸入信箱");
    document.getElementById('btnSendCode').innerText = "發送中...";
    await api({ action: "sendCode", email });
    document.getElementById('btnSendCode').innerText = "已發送";
    document.getElementById('codeSection').style.display = 'block';
  }

  async function verifyCode() {
    const email = document.getElementById('loginEmail').value;
    const code = document.getElementById('loginCode').value;
    const res = await api({ action: "verifyCode", email, code });
    if(res.status === 'success') {
      localStorage.setItem('gx_user', JSON.stringify(res.data));
      location.reload();
    } else { alert("驗證失敗"); }
  }

  function logout() { localStorage.removeItem('gx_user'); location.reload(); }

  // --- 資訊流邏輯 ---
  async function loadFeed() {
    const filter = document.getElementById('filterStatus').value;
    const search = document.getElementById('searchInput').value;
    const res = await api({ action: "getFeed", email: currentUser.email, role: currentUser.role, filter, search, page: currentPage });
    
    if(res.status === 'success') {
      totalPages = res.data.totalPages || 1;
      document.getElementById('pageInfo').innerText = `第 ${currentPage} / ${totalPages} 頁`;
      renderFeed(res.data.posts);
    }
  }

  function renderFeed(posts) {
    const container = document.getElementById('feedContainer');
    container.innerHTML = '';
    
    posts.forEach(post => {
      // 處理影片連結區塊
      const urls = post.VideoURLs.split(',\n').filter(u => u);
      const videoHtml = urls.map((url, i) => `<a href="${url}" target="_blank"><i data-lucide="play-circle"></i> 觀看段落 ${i+1}</a>`).join('');

      let actionButtons = '';
      if (currentUser.role === '學員' && post.Role === '學員' && post.Status !== '已解決') {
        actionButtons = `
          <div class="mt-3 pt-3 border-top d-flex gap-2">
            <button class="btn btn-sm btn-success" onclick="updateStatus(${post.rowIndex}, '已解決')">✅ 有解決問題</button>
            <button class="btn btn-sm btn-danger" onclick="updateStatus(${post.rowIndex}, '呼叫教練')">🚨 呼叫教練來</button>
          </div>
        `;
      } else if (currentUser.role === '教練') {
        actionButtons = `<div class="mt-3 pt-3 border-top"><button class="btn btn-sm btn-primary" onclick="replyTo(${post.rowIndex})">回覆此提問</button></div>`;
      }

      container.innerHTML += `
        <div class="post-card">
          <div class="post-header">
            <div class="fw-bold">${post.Role} 發布於 ${new Date(post.Timestamp).toLocaleString()}</div>
            <span class="badge-status status-${post.Status}">${post.Status}</span>
          </div>
          <p class="mb-1 fw-bold text-primary">📝 AI 重點摘要：</p>
          <p class="text-muted" style="white-space: pre-wrap;">${post.AI_Summary}</p>
          
          ${post.AI_Reply ? `
            <div class="ai-reply-box">
              <p class="mb-1 fw-bold text-success">🤖 AI 初步解答：</p>
              <div style="white-space: pre-wrap;">${post.AI_Reply}</div>
            </div>
          ` : ''}

          <div class="video-gallery">${videoHtml}</div>
          ${actionButtons}
        </div>
      `;
    });
    lucide.createIcons();
  }

  function changePage(delta) {
    const newPage = currentPage + delta;
    if(newPage >= 1 && newPage <= totalPages) {
      currentPage = newPage;
      loadFeed();
    }
  }

  async function updateStatus(rowIndex, status) {
    if(confirm(`確定標記為「${status}」嗎？`)) {
      await api({ action: "updateStatus", postId: rowIndex, status });
      loadFeed();
    }
  }

  function toggleRecordUI() {
    const el = document.getElementById('recordUI');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  // (你的錄影邏輯與 startChunkRecording 可放在這裡，並呼叫 initPost、saveDrive、finalizePost)
  // 此處略過錄影實作細節，與你原版相同，只需更改 payload 帶入 currentUser.email 等資訊。
</script>
</body>
</html>
