<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GROWTHX｜特洛伊AI賦能陪跑教練系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { 
      --primary: #0f172a; --primary-hover: #1e293b; --accent: #2563eb; 
      --bg: #f8fafc; --surface: #ffffff; --border: #f1f5f9;
      --text-main: #1e293b; --text-muted: #475569;
    }
    body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    
    .app-container { max-width: 820px; margin: auto; padding: 30px 20px; color: var(--text-main); }
    .card-panel { background: var(--surface); border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 24px; border: 1px solid rgba(0,0,0,0.03); }
    
    /* 影片錄製器 UI */
    .video-container { position: relative; width: 100%; max-height: 450px; background: #000; border-radius: 12px; margin-bottom: 16px; overflow: hidden; display: none; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .status-badge { position: absolute; top: 16px; right: 16px; background: rgba(220, 38, 38, 0.9); color: white; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; display: none; z-index: 10; align-items: center; gap: 6px; letter-spacing: 0.5px; }
    .pulse-dot { width: 8px; height: 8px; background-color: white; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }
    .controls-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); padding: 12px 24px; border-radius: 100px; display: flex; gap: 20px; align-items: center; opacity: 1; z-index: 20; transition: opacity 0.4s ease; }
    .control-btn { background: none; border: none; color: white; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; outline: none; }
    .control-btn:hover { background: rgba(255, 255, 255, 0.2); }
    
    .post-card { background: var(--surface); border: 1px solid rgba(0,0,0,0.06); border-radius: 16px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.02); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .post-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.06); transform: translateY(-2px); }
    .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .badge-status { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
    
    .status-錄製中 { background: #f1f5f9; color: #475569; }
    .status-待回覆 { background: #fef9c3; color: #854d0e; }
    .status-已回覆 { background: #eff6ff; color: #1e40af; }
    .status-呼叫教練 { background: #fee2e2; color: #b91c1c; }
    .status-已解決 { background: #dcfce7; color: #166534; }
    
    .video-gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-top: 24px; }
    .video-gallery a { display: flex; align-items: center; gap: 6px; padding: 10px 18px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: 500; white-space: nowrap; transition: 0.2s; }
    .video-gallery a:hover { background: #e2e8f0; color: var(--primary); }
    
    .content-box { font-size: 15px; line-height: 1.8; color: var(--text-muted); }
    .content-box h1, .content-box h2, .content-box h3, .content-box h4 { font-size: 16px; font-weight: 700; color: var(--text-main); margin-top: 18px; margin-bottom: 10px; }
    .content-box strong { color: var(--primary); font-weight: 600; background-color: rgba(37, 99, 235, 0.05); padding: 0 4px; border-radius: 4px; }
    .content-box ul, .content-box ol { padding-left: 24px; margin-top: 8px; margin-bottom: 16px; }
    .content-box li { margin-bottom: 8px; }
    .content-box p { margin-bottom: 12px; }
    .content-box p:last-child { margin-bottom: 0; }
    
    .ai-reply-box { background: #f8fafc; padding: 24px; border-radius: 12px; margin-top: 24px; border: 1px solid rgba(0,0,0,0.04); }
    
    details { margin-bottom: 24px; }
    details summary { cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 8px; list-style: none; user-select: none; transition: color 0.2s; }
    details summary:hover { color: var(--text-main); }
    details summary::-webkit-details-marker { display: none; }
    .details-content { background: #fcfcfc; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 12px; font-size: 13px; line-height: 1.6; max-height: 300px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; white-space: pre-wrap; color: var(--text-muted); }

    .btn { font-weight: 500; border-radius: 8px; padding: 8px 16px; transition: all 0.2s; }
    .btn-brand { background-color: var(--primary); color: white; border: none; }
    .btn-brand:hover { background-color: var(--primary-hover); color: white; }
    .form-control, .form-select { border-radius: 10px; border: 1px solid #cbd5e1; padding: 12px 16px; box-shadow: none; font-size: 15px; }
    .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  </style>
</head>
<body>

<div class="app-container">
  <div id="view-login" class="card-panel text-center" style="max-width: 400px; margin: 40px auto;">
    <div class="d-flex justify-content-center mb-4">
      <i data-lucide="layers" style="width: 40px; height: 40px; color: var(--primary);"></i>
    </div>
    <h3 class="fw-bold mb-2">GROWTHX｜特洛伊AI賦能陪跑教練系統</h3>
    <p class="text-muted mb-4" style="font-size: 14px;">請輸入工作信箱獲取登入權限</p>
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="name@company.com">
    <button class="btn btn-brand w-100 mb-2 py-2" onclick="sendCode()" id="btnSendCode">獲取驗證碼</button>
    <div id="codeSection" style="display:none; margin-top: 20px;">
      <input type="text" id="loginCode" class="form-control mb-3 text-center" placeholder="輸入 6 位數字" style="letter-spacing: 4px; font-size: 18px;">
      <button class="btn btn-dark w-100 py-2" onclick="verifyCode()">驗證登入</button>
    </div>
  </div>

  <div id="view-main" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
      <h4 id="userGreeting" class="fw-bold m-0 d-flex align-items-center" style="color: var(--primary);"></h4>
      <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2" onclick="logout()">
        <i data-lucide="log-out" style="width: 14px;"></i> 登出
      </button>
    </div>

    <div class="card-panel">
      <div class="d-flex justify-content-between align-items-center" style="cursor:pointer;" onclick="toggleRecordUI()">
        <h5 class="m-0 fw-semibold d-flex align-items-center" style="color: var(--primary);">
          <i data-lucide="video" class="me-3" style="color: var(--accent);"></i> 發起新提問 / 回覆
        </h5>
        <i data-lucide="chevron-down" style="color: var(--text-muted);"></i>
      </div>
      
      <div id="recordUI" style="display:none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
        <div id="replyBadge" class="alert bg-light border-0 text-secondary fw-medium py-2 d-flex align-items-center gap-2" style="display:none; font-size:14px;">
          <i data-lucide="corner-down-right" style="width: 16px;"></i> <span id="replyText"></span>
        </div>
        
        <div class="video-container" id="videoContainer">
          <div id="recBadge" class="status-badge"><div class="pulse-dot"></div><span id="recText">REC</span></div>
          <video id="mediaPlayer" autoplay muted playsinline></video>
          <div class="controls-overlay" id="playerControls">
            <button class="control-btn" onclick="switchSourceAction()" title="切換鏡頭/螢幕"><i data-lucide="switch-camera"></i></button>
            <button class="control-btn" onclick="toggleVideo()" title="開關畫面"><i data-lucide="video-off" id="icon-video"></i></button>
            <div class="control-divider" id="recordDivider" style="display:none;"></div>
            <button class="control-btn pause-btn" id="btnPause" onclick="pauseMeeting()" style="display:none;"><i data-lucide="pause" style="fill:currentColor;"></i></button>
            <button class="control-btn play-btn" id="btnResume" onclick="resumeMeeting()" style="display:none;"><i data-lucide="play" style="fill:currentColor;"></i></button>
            <button class="control-btn stop-btn" id="btnStop" onclick="stopMeeting()" style="display:none;"><i data-lucide="square" style="fill:currentColor;"></i></button>
          </div>
        </div>

        <button class="btn btn-brand w-100 mt-2 py-3 d-flex justify-content-center align-items-center gap-2" id="btnStartPost" onclick="startPost()">
          <i data-lucide="play-circle" style="width: 20px;"></i> 開始錄製說明
        </button>
        <p id="recordStatus" class="mt-3 text-center text-muted fw-medium" style="font-size:14px; letter-spacing: 0.5px;"></p>
      </div>
    </div>

    <div class="d-flex gap-3 mb-4">
      <select id="filterStatus" class="form-select w-auto" onchange="currentPage=1; applyLocalFilter()">
        <option value="全部">全部狀態</option>
        <option value="待回覆">待回覆</option>
        <option value="呼叫教練">已呼叫教練</option>
        <option value="已解決">已解決</option>
      </select>
      <div class="position-relative flex-grow-1">
        <i data-lucide="search" class="position-absolute text-muted" style="left: 14px; top: 14px; width: 18px;"></i>
        <input type="text" id="searchInput" class="form-control" style="padding-left: 42px;" placeholder="搜尋對話關鍵字 (邊打字邊搜尋)..." oninput="currentPage=1; applyLocalFilter()">
      </div>
    </div>

    <div id="feedContainer"></div>
    
    <div class="d-flex justify-content-between align-items-center mt-4 mb-5">
      <button class="btn btn-outline-secondary btn-sm" onclick="changePage(-1)">上一頁</button>
      <span id="pageInfo" class="text-muted" style="font-size:14px; font-weight: 500;"></span>
      <button class="btn btn-outline-secondary btn-sm" onclick="changePage(1)">下一頁</button>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8Ieg90ujrYBfX1Psn5GNLgBr_W-pIja7b99B3Whiaa2BI4v0VsSmTLMSV81_nMNUi/exec";
  marked.setOptions({ breaks: true, gfm: true });

  let currentUser = JSON.parse(localStorage.getItem('gx_user') || 'null');
  
  let localPosts = []; 
  let currentPage = 1, totalPages = 1;
  let targetParentId = ""; 
  
  let currentStream = null, mediaRecorder = null;
  let chunkInterval, chunkIndex = 1;
  let postData = { folderId: '', rowIndex: 0, postId: '' };
  let isRecording = false, isPaused = false, isVideoEnabled = false;
  let activeProcessingTasks = new Set();
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  let mobileFacingMode = "user", desktopSource = "camera";

  const mediaPlayer = document.getElementById('mediaPlayer');

  if (currentUser) {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-main').style.display = 'block';
    document.getElementById('userGreeting').innerHTML = `<i data-lucide="user" class="me-2" style="width:20px;"></i> 你好，${currentUser.role} ${currentUser.email.split('@')[0]}`;
    lucide.createIcons();
    fetchDataAndRender(); 
  }

  async function api(payload) {
    try {
      const res = await fetch(GAS_URL, { method: "POST", redirect: "follow", body: JSON.stringify(payload) });
      return await res.json();
    } catch(err) { alert("網路請求失敗: " + err.message); throw err; }
  }

  async function sendCode() {
    const email = document.getElementById('loginEmail').value;
    if(!email) return alert("請輸入信箱");
    document.getElementById('btnSendCode').innerHTML = '<i data-lucide="loader" class="pulse-dot bg-transparent me-2"></i> 發送中...';
    lucide.createIcons();
    await api({ action: "sendCode", email });
    document.getElementById('btnSendCode').innerText = "驗證碼已送至信箱";
    document.getElementById('codeSection').style.display = 'block';
  }
  async function verifyCode() {
    const email = document.getElementById('loginEmail').value;
    const code = document.getElementById('loginCode').value;
    const res = await api({ action: "verifyCode", email, code });
    if(res.status === 'success') { localStorage.setItem('gx_user', JSON.stringify(res.data)); location.reload(); } 
    else { alert("驗證碼輸入錯誤或已過期"); }
  }
  function logout() { localStorage.removeItem('gx_user'); location.reload(); }

  // 💡 獲取基本影像流 (優化手機自適應縮放)
  async function acquireStream() {
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());
    let constraints = { audio: true, video: { width: { ideal: 854 }, height: { ideal: 480 } } };
    
    if (isMobile) {
      constraints.video.facingMode = mobileFacingMode;
    } else if (desktopSource === "screen") {
      try {
        currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        currentStream.getVideoTracks()[0].onended = () => { if(isRecording) { desktopSource = "camera"; switchSourceAction(); } };
      } catch (err) { console.error("螢幕分享取消", err); return; }
    }
    
    if (!currentStream || desktopSource === "camera") {
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    }
    
    mediaPlayer.srcObject = currentStream;
    const videoTrack = currentStream.getVideoTracks()[0];
    if (videoTrack) videoTrack.enabled = isVideoEnabled;
  }

  // 💡 賈伯斯級零延遲軌道熱插拔 (Hot-Swap Track Replacement)
  async function switchSourceAction() {
    if (isMobile) mobileFacingMode = (mobileFacingMode === "user") ? "environment" : "user";
    else desktopSource = (desktopSource === "camera") ? "screen" : "camera";

    try {
      let newStream;
      let constraints = { video: { width: { ideal: 854 }, height: { ideal: 480 } } };
      
      if (isMobile) {
        constraints.video.facingMode = mobileFacingMode;
        newStream = await navigator.mediaDevices.getUserMedia(constraints);
      } else {
        if (desktopSource === "camera") {
          newStream = await navigator.mediaDevices.getUserMedia(constraints);
        } else {
          newStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          newStream.getVideoTracks()[0].onended = () => { if(isRecording) { desktopSource = "camera"; switchSourceAction(); } };
        }
      }

      // 如果正在錄影中，我們「不停止」錄影，直接把新鏡頭軌道塞入正在錄製的 stream 中
      if (currentStream) {
        const oldVideoTrack = currentStream.getVideoTracks()[0];
        const newVideoTrack = newStream.getVideoTracks()[0];
        
        if (newVideoTrack) {
          newVideoTrack.enabled = isVideoEnabled;
          currentStream.addTrack(newVideoTrack); // 先加入新軌道確保無縫
          if (oldVideoTrack) {
            currentStream.removeTrack(oldVideoTrack); // 移除舊軌道
            oldVideoTrack.stop();
          }
        }
      } else {
        await acquireStream();
      }
    } catch (err) {
      console.error("無縫切換鏡頭失敗:", err);
      // 如果失敗，退回傳統模式確保穩定性
      await acquireStream();
    }
  }

  function toggleVideo() {
    if (currentStream && currentStream.getVideoTracks()[0]) {
      isVideoEnabled = !isVideoEnabled;
      currentStream.getVideoTracks()[0].enabled = isVideoEnabled;
      document.getElementById('icon-video').setAttribute('data-lucide', isVideoEnabled ? 'video' : 'video-off');
      lucide.createIcons();
    }
  }

  function toggleRecordUI(forceOpen = false) {
    const el = document.getElementById('recordUI');
    el.style.display = (forceOpen || el.style.display === 'none') ? 'block' : 'none';
    if(el.style.display === 'block') {
      document.getElementById('videoContainer').style.display = 'block';
      acquireStream().catch(()=>{});
    } else {
      if (currentStream) currentStream.getTracks().forEach(track => track.stop());
      targetParentId = ""; 
      document.getElementById('replyBadge').style.display = 'none';
    }
  }

  function replyTo(postId) {
    targetParentId = postId;
    document.getElementById('replyText').innerText = `正在延續對話脈絡 #${postId}`;
    document.getElementById('replyBadge').style.display = 'flex';
    toggleRecordUI(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function startPost() {
    const btn = document.getElementById('btnStartPost');
    btn.disabled = true;
    document.getElementById('recordStatus').innerText = "系統安全連線中...";
    try {
      const res = await api({ action: "initPost", email: currentUser.email, role: currentUser.role, parentId: targetParentId });
      if (res.status === 'success') {
        postData = res.data;
        document.getElementById('recordDivider').style.display = 'block';
        document.getElementById('btnPause').style.display = 'flex';
        document.getElementById('btnStop').style.display = 'flex';
        btn.style.display = 'none';
        
        if (!currentStream) await acquireStream();
        isRecording = true; isPaused = false; chunkIndex = 1;
        document.getElementById('recBadge').style.display = 'flex';
        document.getElementById('recordStatus').innerText = "錄製進行中... (背景無縫同步中)";
        startChunkRecording();
      }
    } catch(e) { document.getElementById('recordStatus').innerText = "啟動失敗，請確認網路連線"; btn.disabled = false; }
  }

  function pauseMeeting() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      isPaused = true; mediaRecorder.stop(); clearTimeout(chunkInterval);
      document.getElementById('btnPause').style.display = 'none';
      document.getElementById('btnResume').style.display = 'flex';
      document.getElementById('recBadge').style.background = "#f59e0b";
      document.getElementById('recText').innerText = "PAUSED";
      document.getElementById('recordStatus').innerText = "錄製已暫停";
    }
  }
  function resumeMeeting() {
    if (currentStream) {
      isPaused = false; startChunkRecording();
      document.getElementById('btnResume').style.display = 'none';
      document.getElementById('btnPause').style.display = 'flex';
      document.getElementById('recBadge').style.background = "rgba(220, 38, 38, 0.9)";
      document.getElementById('recText').innerText = "REC";
      document.getElementById('recordStatus').innerText = "錄製進行中...";
    }
  }

  function startChunkRecording() {
    if (!isRecording || !currentStream || isPaused) return;
    let recordedChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    mediaRecorder = new MediaRecorder(currentStream, { mimeType: mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    
    mediaRecorder.onstop = () => {
      if (recordedChunks.length > 0) {
        const blob = new Blob(recordedChunks, { type: mimeType });
        processChunk(blob, mimeType, chunkIndex);
        chunkIndex++;
      }
      if (isRecording && !isPaused) startChunkRecording();
    };
    try { mediaRecorder.start(); chunkInterval = setTimeout(() => { if (mediaRecorder.state === "recording") mediaRecorder.stop(); }, 60000); } catch (err) {}
  }

  function processChunk(blob, mimeType, cIndex) {
    const task = new Promise(resolve => {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = async () => {
        const b64 = reader.result.split(',')[1];
        try {
          await Promise.all([
            api({ action: "saveDrive", base64Data: b64, mimeType: mimeType, folderId: postData.folderId, rowIndex: postData.rowIndex, chunkIndex: cIndex }),
            api({ action: "recognizeAI", base64Data: b64, mimeType: mimeType, rowIndex: postData.rowIndex, chunkIndex: cIndex })
          ]);
        } catch(err) { console.error(`切片 ${cIndex} 上傳錯誤`, err); } finally { resolve(); }
      };
    });
    activeProcessingTasks.add(task);
    task.then(() => activeProcessingTasks.delete(task));
  }

  async function stopMeeting() {
    isRecording = false; isPaused = false; clearTimeout(chunkInterval);
    document.getElementById('recBadge').style.display = 'none';
    document.getElementById('playerControls').style.display = 'none';
    document.getElementById('recordStatus').innerHTML = '<i data-lucide="loader" class="pulse-dot bg-transparent me-2 d-inline-block"></i> 正在安全封裝檔案並產出智能分析...';
    lucide.createIcons();
    
    const onStopPromise = new Promise(resolve => {
      if (mediaRecorder && (mediaRecorder.state === "recording" || mediaRecorder.state === "paused")) {
        const originalOnStop = mediaRecorder.onstop;
        mediaRecorder.onstop = (e) => { if(originalOnStop) originalOnStop(e); resolve(); };
        mediaRecorder.stop(); 
      } else { resolve(); }
    });

    await onStopPromise;
    if(currentStream) currentStream.getTracks().forEach(t => t.stop());
    while(activeProcessingTasks.size > 0) await Promise.all(Array.from(activeProcessingTasks));

    await api({ action: "finalizePost", rowIndex: postData.rowIndex, email: currentUser.email });
    
    document.getElementById('recordStatus').innerText = "分析完成！";
    setTimeout(() => {
      toggleRecordUI(false); 
      const btn = document.getElementById('btnStartPost');
      btn.disabled = false;
      btn.style.display = 'flex';
      fetchDataAndRender(); // 重新抓取最新資料以更新畫面
    }, 1500);
  }

  // 💡 向後端抓取一次資料，並存入 Frontend Cache
  async function fetchDataAndRender() {
    const res = await api({ action: "getFeed", email: currentUser.email, role: currentUser.role });
    if(res.status === 'success') {
      localPosts = res.data.posts;
      currentPage = 1;
      applyLocalFilter(); // 抓完資料後自動執行本地篩選
    }
  }

  // 💡 在前端執行毫秒級的資料篩選與分頁
  function applyLocalFilter() {
    const filter = document.getElementById('filterStatus').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    let filtered = localPosts;
    
    if (filter && filter !== '全部') {
      filtered = filtered.filter(p => p.Status === filter);
    }
    
    if (search) {
      filtered = filtered.filter(p => 
        (p.AI_Summary && p.AI_Summary.toLowerCase().includes(search)) || 
        (p.Transcript && p.Transcript.toLowerCase().includes(search))
      );
    }
    
    const itemsPerPage = 5;
    totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
    
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
    
    const startIndex = (currentPage - 1) * itemsPerPage;
    const paginatedPosts = filtered.slice(startIndex, startIndex + itemsPerPage);
    
    renderFeed(paginatedPosts);
  }

  function renderFeed(posts) {
    const container = document.getElementById('feedContainer');
    container.innerHTML = '';
    
    posts.forEach(post => {
      const urls = post.VideoURLs.split(',\n').filter(u => u);
      const videoHtml = urls.map((url, i) => `<a href="${url}" target="_blank"><i data-lucide="play" style="width:14px; fill:currentColor;"></i> 段落 ${i+1}</a>`).join('');

      let cleanSummary = (post.AI_Summary || '系統處理中...').replace(/####/g, '');
      let cleanReply = (post.AI_Reply || '').replace(/####/g, '');
      const htmlSummary = marked.parse(cleanSummary);
      const htmlReply = marked.parse(cleanReply);

      let actionButtons = '';
      if (currentUser.role === '學員' && post.Role === '學員' && post.Status !== '已解決') {
        actionButtons = `
          <div class="mt-4 pt-4 border-top d-flex flex-wrap gap-3">
            <button class="btn btn-sm btn-outline-success d-flex align-items-center gap-2" onclick="updateStatus(${post.rowIndex}, '已解決')">
              <i data-lucide="check-circle" style="width:16px;"></i> 已解決問題
            </button>
            <button class="btn btn-sm btn-outline-danger d-flex align-items-center gap-2" onclick="updateStatus(${post.rowIndex}, '呼叫教練')">
              <i data-lucide="bell-ring" style="width:16px;"></i> 呼叫教練
            </button>
            <button class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-2" onclick="replyTo('${post.PostID}')">
              <i data-lucide="message-square-plus" style="width:16px;"></i> 繼續追問
            </button>
          </div>
        `;
      } else if (currentUser.role === '教練' && post.Role === '學員') {
        actionButtons = `
          <div class="mt-4 pt-4 border-top">
            <button class="btn btn-sm btn-outline-primary d-flex align-items-center gap-2" onclick="replyTo('${post.PostID}')">
              <i data-lucide="reply" style="width:16px;"></i> 回覆此提問
            </button>
          </div>
        `;
      }

      container.innerHTML += `
        <div class="post-card">
          <div class="post-header">
            <div class="d-flex align-items-center gap-2 fw-semibold text-main">
               <i data-lucide="${post.Role === '教練' ? 'shield-check' : 'user'}" style="width:18px; color: var(--text-muted);"></i>
               ${post.Role} 發布於 ${new Date(post.Timestamp).toLocaleString('zh-TW', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
            </div>
            <span class="badge-status status-${post.Status}">${post.Status}</span>
          </div>
          
          <details>
            <summary><i data-lucide="align-left" style="width:16px;"></i> 檢視完整逐字稿與畫面紀錄</summary>
            <div class="details-content">${post.Transcript}</div>
          </details>

          <div class="mb-2">
            <div class="d-flex align-items-center fw-semibold text-main mb-2">
              <i data-lucide="file-text" style="width:18px; margin-right: 8px;"></i> 內容重點摘要
            </div>
            <div class="content-box">${htmlSummary}</div>
          </div>
          
          ${post.Role === '學員' && post.AI_Reply ? `
            <div class="ai-reply-box">
              <div class="d-flex align-items-center fw-semibold text-success mb-3">
                <i data-lucide="cpu" style="width:18px; margin-right: 8px;"></i> AI 智能解答視角
              </div>
              <div class="content-box">${htmlReply}</div>
            </div>
          ` : ''}

          <div class="video-gallery">${videoHtml}</div>
          ${actionButtons}
        </div>
      `;
    });
    lucide.createIcons();
  }

  function changePage(delta) {
    const newPage = currentPage + delta;
    if(newPage >= 1 && newPage <= totalPages) { 
      currentPage = newPage; 
      applyLocalFilter(); 
      window.scrollTo({top:0, behavior:'smooth'}); 
    }
  }

  async function updateStatus(rowIndex, status) {
    if(confirm(`確定將此對話標記為「${status}」嗎？`)) {
      await api({ action: "updateStatus", postId: rowIndex, status });
      fetchDataAndRender(); // 狀態變更後，重新跟後端抓取一次同步資料
    }
  }
</script>
</body>
</html>
